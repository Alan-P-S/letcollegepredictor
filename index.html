<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LET College Predictor</title>

<style>
body{
    margin:0;
    font-family:Segoe UI,Tahoma,sans-serif;
    background:#f1f5f9;
    color:#1e293b;
}

.header{
    background:linear-gradient(
        135deg,
        #0d47a1,
        #1565c0
    );
    color:white;
    padding:30px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.header h1{
    margin:0;
    font-size:32px;
}

.header p{
    margin-top:8px;
    opacity:.9;
}

.container{
    max-width:1200px;
    margin:25px auto;
    padding:0 15px;
}

.controls{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

input,
select{
    flex:1;
    min-width:180px;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
}

button{
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#0d47a1;
}

.table-wrapper{
    margin-top:20px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#1565c0;
    color:white;
}
.high{
    color: red;
}
.medium{
    color:orange;
}
.safe{
    color: green;
}
th{
    padding:14px;
    text-align:left;
}

td{
    padding:12px 14px;
    border-bottom:1px solid #e2e8f0;
}

tbody tr:hover{
    background:#f8fafc;
}

.safe{
    color:#16a34a;
    font-weight:700;
}

.likely{
    color:#ca8a04;
    font-weight:700;
}

.borderline{
    color:#dc2626;
    font-weight:700;
}
</style>
</head>
<body>

<center><h1>Kerala LET College Predictor</h1><p>Based on Trail Allotment</p><p>After search wait for 5-10s to load</p></center>

<div class="controls">
    <input
        type="number"
        id="rank"
        placeholder="Enter Rank"
    >

    <select id="category">
        <option value="SM">SM</option>
        <option value="EZ">EZ</option>
        <option value="MU">MU</option>
        <option value="BH">BH</option>
        <option value="LC">LC</option>
        <option value="DV">DV</option>
        <option value="KU">KU</option>
        <option value="VK">VK</option>
        <option value="KN">KN</option>
        <option value="BX">BX</option>
        <option value="EWS">EWS</option>
        <option value="SC">SC</option>
        <option value="ST">ST</option>
        <option value="XS">XS</option>
        <option value="PD">PD</option>
    </select>

    <button onclick="predict()">
        Predict
    </button>
</div>

<table>
    <thead>
        <tr>
            <th>College</th>
            <th>Course</th>
            <th>Closing Rank</th>
            <th>Chance</th>
        </tr>
    </thead>

    <tbody id="results"></tbody>
</table>

<script>

let cutoffs = [];

async function loadData() {

    const res = await fetch("./cutoffs.json");

    cutoffs = await res.json();

    console.log(
        "Loaded",
        cutoffs.length,
        "cutoffs"
    );
}

function predict() {

    const rank =
        Number(
            document.getElementById("rank").value
        );

    const category =
        document.getElementById("category").value;

    const possible = cutoffs
        .filter(c =>
            c.category === category &&
            c.closingRank >= rank
        )
        .sort(
            (a,b) =>
                a.closingRank -
                b.closingRank
        );

    const tbody =
        document.getElementById("results");

    tbody.innerHTML = "";

    possible.forEach(item => {

        const diff =
            item.closingRank - rank;

        let chance = "";
        let cls = "";

        if(diff <= 100){
            chance = "Competitive";
            cls = "high";
        }
        else if(diff <= 500){
            chance = "Likely";
            cls = "medium";
        }
        else{
            chance = "Safe";
            cls = "safe";
        }

        tbody.innerHTML += `
        <tr>
            <td>${item.collegeName}</td>
            <td>${item.courseName}</td>
            <td>${item.closingRank}</td>
            <td class="${cls}">
                ${chance}
            </td>
        </tr>
        `;
    });
}

loadData();

</script>

</body>
</html>
